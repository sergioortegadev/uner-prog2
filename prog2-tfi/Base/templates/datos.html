<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>{{ page_title }}</title>
 <style>
  body {
   background-color: #222;
   color: #ccc;
   font-size: large;
   display: flex;
   flex-direction: column;
   align-items: center;
   text-align: center;
   font-family: sans-serif;
   margin: 0;
  }

  main {
   min-height: 100vh;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: flex-start;
   padding-top: 2rem;
  }

  .contenedor-datos {
   background-color: #333;
   border: 1px solid #555;
   border-radius: .5rem;
   padding: 2rem;
   margin: 1.5rem;
   width: 80vw;
   max-width: 800px;
   text-align: left;
  }

  pre {
   white-space: pre-wrap;
   word-wrap: break-word;
   background-color: #222;
   padding: 1rem;
   border-radius: .5rem;
   line-height: 1.4;
  }

  button {
   background-color: #37c;
   color: #222;
   padding: .5rem .75rem;
   border-radius: .25rem;
   border: transparent;
   font-size: large;
   margin: 1rem
  }

  button:hover {
   scale: .95;
  }

  footer {
   width: 100vw;
   background-color: #444;
   color: #ddd;
   display: flex;
   flex-direction: column;
   align-items: center;
   position: sticky;
   bottom: 0;
   padding-bottom: .5rem;
  }

  footer li {
   list-style: none;
  }
 </style>
</head>

<body>
 <main>
  <h2>{{ titulo_datos }}</h2>

  <div class="contenedor-datos">
   <pre>{{ contenido }}</pre>
  </div>

  <a href="/">
   <button>Volver</button>
  </a>
 </main>

 <footer>
  <h3>Integrantes:</h3>
  <ul>
   <li>Ortega, Sergio</li>
   <li>Ruiz, Jorge</li>
   <li>Sandoval, Edgardo</li>
  </ul>
 </footer>

</body>

</html>
